name: Build patched Codex

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Codex source
        uses: actions/checkout@v4
        with:
          repository: openai/codex
          ref: rust-v0.125.0-alpha.3

      - name: Patch tcp_user_timeout
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import sys

          candidates = [
              Path("codex-rs/login/src/auth/default_client.rs"),
              Path("codex-rs/core/src/default_client.rs"),
          ]

          p = next((x for x in candidates if x.exists()), None)

          if p is None:
              print("Cannot find default_client.rs. Existing matches:")
              for x in Path("codex-rs").rglob("default_client.rs"):
                  print("  ", x)
              sys.exit(1)

          print(f"Patching: {p}")

          s = p.read_text()

          if "DEFAULT_TCP_USER_TIMEOUT" in s:
              print("Patch already applied; skip.")
          else:
              import_anchor = "use std::sync::RwLock;\n"
              import_patch = (
                  "use std::sync::RwLock;\n"
                  "#[cfg(any(target_os = \"android\", target_os = \"fuchsia\", target_os = \"linux\"))]\n"
                  "use std::time::Duration;\n"
              )

              if import_anchor in s:
                  s = s.replace(import_anchor, import_patch, 1)
              else:
                  import_anchor_alt = "use std::sync::RwLock;"
                  if import_anchor_alt not in s:
                      raise SystemExit("Cannot find RwLock import insertion point")
                  s = s.replace(import_anchor_alt, import_patch, 1)

              const_anchor = 'pub const RESIDENCY_HEADER_NAME: &str = "x-openai-internal-codex-residency";\n'
              const_patch = (
                  'pub const RESIDENCY_HEADER_NAME: &str = "x-openai-internal-codex-residency";\n'
                  "#[cfg(any(target_os = \"android\", target_os = \"fuchsia\", target_os = \"linux\"))]\n"
                  "const DEFAULT_TCP_USER_TIMEOUT: Duration = Duration::from_secs(300);\n"
              )

              if const_anchor in s:
                  s = s.replace(const_anchor, const_patch, 1)
              else:
                  const_anchor_alt = 'pub const RESIDENCY_HEADER_NAME: &str = "x-openai-internal-codex-residency";'
                  const_patch_alt = (
                      const_anchor_alt
                      + "\n#[cfg(any(target_os = \"android\", target_os = \"fuchsia\", target_os = \"linux\"))]\n"
                      + "const DEFAULT_TCP_USER_TIMEOUT: Duration = Duration::from_secs(300);"
                  )
                  if const_anchor_alt not in s:
                      raise SystemExit("Cannot find RESIDENCY_HEADER_NAME insertion point")
                  s = s.replace(const_anchor_alt, const_patch_alt, 1)

              marker = ".default_headers(default_headers());"
              if marker not in s:
                  raise SystemExit("Cannot find reqwest builder .default_headers(...) insertion point")

              insert = (
                  "\n\n"
                  "    // Workaround for long-running remote compaction requests on Linux.\n"
                  "    #[cfg(any(target_os = \"android\", target_os = \"fuchsia\", target_os = \"linux\"))]\n"
                  "    {\n"
                  "        builder = builder.tcp_user_timeout(DEFAULT_TCP_USER_TIMEOUT);\n"
                  "    }"
              )

              idx = s.find(marker) + len(marker)
              s = s[:idx] + insert + s[idx:]

              p.write_text(s)
              print("Patch applied.")

          print("Patch verification:")
          for i, line in enumerate(p.read_text().splitlines(), start=1):
              if "DEFAULT_TCP_USER_TIMEOUT" in line or "tcp_user_timeout" in line:
                  print(f"{i}: {line}")
          PY

      - name: Build Codex binary
        working-directory: codex-rs
        run: |
          cargo build --release --bin codex

      - name: Package binary
        run: |
          mkdir -p out
          cp codex-rs/target/release/codex out/codex
          chmod +x out/codex
          tar -czf codex-patched-linux-x86_64.tar.gz -C out codex

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-patched-linux-x86_64
          path: codex-patched-linux-x86_64.tar.gz
