name: Build patched Codex

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Codex source
        uses: actions/checkout@v4
        with:
          repository: openai/codex
          ref: rust-v0.125.0-alpha.3
          fetch-depth: 1

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libcap-dev

      - name: Fetch and verify tcp_user_timeout fix
        run: |
          git fetch https://github.com/ikingye/codex.git fix/disable-reqwest-tcp-user-timeout

          PATCH_SHA="$(git rev-parse FETCH_HEAD)"
          echo "Fetched patch SHA: $PATCH_SHA"

          test "$PATCH_SHA" = "9ef5ccd66c1aa710ce521a18ef8f618c650c553d"

      - name: Apply tcp_user_timeout fix
        run: |
          git cherry-pick --no-commit FETCH_HEAD

          echo "Changed files:"
          git diff --name-only

          echo "Verifying patch content:"
          grep -n "disable_reqwest_tcp_user_timeout" codex-rs/login/src/auth/default_client.rs
          grep -n "tcp_user_timeout(None)" codex-rs/login/src/auth/default_client.rs
          grep -n "builder = disable_reqwest_tcp_user_timeout(builder);" codex-rs/login/src/auth/default_client.rs

          git diff --check

      - name: Build Codex binary
        working-directory: codex-rs
        run: |
          cargo build --release --bin codex

      - name: Verify built binary
        run: |
          ./codex-rs/target/release/codex --version
          ls -lh ./codex-rs/target/release/codex

      - name: Package binary
        run: |
          mkdir -p out
          cp codex-rs/target/release/codex out/codex
          chmod +x out/codex
          tar -czf codex-patched-linux-x86_64.tar.gz -C out codex
          ls -lh codex-patched-linux-x86_64.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-patched-linux-x86_64
          path: codex-patched-linux-x86_64.tar.gz
